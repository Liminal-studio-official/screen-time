name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - {name: Windows, os: windows-latest, target: Win32}
        - {name: Android32, os: ubuntu-latest, target: Android32}
        - {name: Android64, os: ubuntu-latest, target: Android64}
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: geode-sdk/build-geode-mod@v1
      with:
        target: ${{ matrix.config.target }}
        combine: true
  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: geode-sdk/build-geode-mod/combine@v1
      id: build
    - uses: actions/upload-artifact@v4
      with:
        name: Build
        path: ${{ steps.build.outputs.build-output }}
