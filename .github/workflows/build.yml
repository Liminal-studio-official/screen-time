name: mod-builds

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  android64:
    runs-on: ubuntu-latest
    steps:
      - name: get repo
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install geode cli
        run: pip install geode

      - name: setup geode sdk
        run: |
          geode sdk install 5.4.1
          geode sdk use 5.4.1
          geode sdk install-binaries android64

      - name: generate files
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET_PLATFORM=Android64

      - name: compile
        run: cmake --build build --config Release

      - name: upload android64
        uses: actions/upload-artifact@v4
        with:
          name: screentime-android64
          path: build/**/*.geode

  android32:
    runs-on: ubuntu-latest
    steps:
      - name: get repo
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install geode cli
        run: pip install geode

      - name: setup geode sdk
        run: |
          geode sdk install 5.4.1
          geode sdk use 5.4.1
          geode sdk install-binaries android32

      - name: generate files
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET_PLATFORM=Android32

      - name: compile
        run: cmake --build build --config Release

      - name: upload android32
        uses: actions/upload-artifact@v4
        with:
          name: screentime-android32
          path: build/**/*.geode

  windows:
    runs-on: windows-latest
    steps:
      - name: get repo
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install geode cli
        run: pip install geode

      - name: setup geode sdk
        shell: bash
        run: |
          geode sdk install 5.4.1
          geode sdk use 5.4.1
          geode sdk install-binaries win

      - name: generate files
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET_PLATFORM=Win32

      - name: compile
        shell: bash
        run: cmake --build build --config Release

      - name: upload windows
        uses: actions/upload-artifact@v4
        with:
          name: screentime-windows
          path: build/**/*.geode
